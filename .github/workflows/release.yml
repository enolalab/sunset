name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux amd64
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            binary: sunset
          # Linux arm64
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            binary: sunset
          # macOS arm64 (Apple Silicon — also runs amd64 via Rosetta 2)
          - os: darwin
            arch: arm64
            runner: macos-latest
            binary: sunset

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.Version=${{ steps.version.outputs.version }}" \
            -o ${{ matrix.binary }} \
            ./cmd/sunset/

      - name: Package
        shell: bash
        run: |
          ARCHIVE="sunset_${{ steps.version.outputs.version }}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz"
          tar czf "$ARCHIVE" ${{ matrix.binary }}
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Generate checksum
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "darwin" ]]; then
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sunset-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate combined checksums
        run: |
          cd dist
          cat *.sha256 > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Sunset v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
